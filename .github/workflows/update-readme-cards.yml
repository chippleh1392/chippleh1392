name: Update README cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=10
          path: profile/top-langs.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate studio-pulse-demo pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=studio-pulse-demo
          path: profile/pin-studio-pulse-demo.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Generate astro-redundant-roles-repro pin card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=astro-redundant-roles-repro
          path: profile/pin-astro-redundant-roles-repro.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "Update README cards"
          git push
